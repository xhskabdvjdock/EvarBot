<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EvarBot - لوحة التحكم</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <div class="bg-animated">
        <div class="orb"></div>
        <div class="orb"></div>
        <div class="orb"></div>
    </div>

    <!-- Navbar -->
    <nav class="navbar">
        <a href="/dashboard" class="navbar-brand">
            <div class="icon"><i class="fa-solid fa-robot"></i></div>
            <span>EvarBot</span>
        </a>
        <div class="navbar-user">
            <img id="user-avatar" src="" alt="avatar">
            <span id="user-name"></span>
            <a href="/auth/logout" class="btn btn-logout">خروج</a>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="main">
        <!-- Header -->
        <div class="page-header">
            <h1><i class="fa-solid fa-hand-sparkles" style="color: #fbbf24;"></i> مرحباً، <span id="greeting-name"></span></h1>
            <p>هنا تقدر تتحكم بالبوت وتدير سيرفراتك بكل سهولة</p>
        </div>

        <!-- Stats -->
        <div class="stats-grid" id="stats-grid">
            <div class="stat-card">
                <div class="stat-icon"><i class="fa-solid fa-globe" style="color: #5865f2;"></i></div>
                <div class="stat-value" id="stat-servers">-</div>
                <div class="stat-label">السيرفرات</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fa-solid fa-users" style="color: #43b581;"></i></div>
                <div class="stat-value" id="stat-users">-</div>
                <div class="stat-label">المستخدمين</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fa-solid fa-satellite-dish" style="color: #faa61a;"></i></div>
                <div class="stat-value" id="stat-ping">-</div>
                <div class="stat-label">البنق</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fa-solid fa-stopwatch" style="color: #eb459e;"></i></div>
                <div class="stat-value" id="stat-uptime">-</div>
                <div class="stat-label">وقت التشغيل</div>
            </div>
        </div>

        <!-- Servers -->
        <h2 class="section-title"><i class="fa-solid fa-house"></i> سيرفراتك</h2>
        <div id="guilds-container" class="guilds-grid">
            <div class="loading">
                <div class="spinner"></div>
            </div>
        </div>

        <!-- Lavalink -->
        <h2 class="section-title"><i class="fa-solid fa-music"></i> إعداد Lavalink (الموسيقى)</h2>
        <div class="card" style="margin-bottom: 24px;">
            <div class="card-header">
                <h3>بيانات الخادم</h3>
                <p style="color: var(--text-secondary); margin-top: 6px;">غيّر بيانات Lavalink عندما يتوقف خادم مجاني. يتم حفظها وتطبيقها فورًا.</p>
            </div>
            <div class="card-body">
                <div class="form-grid" style="grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px;">
                    <div class="form-group">
                        <label>Host</label>
                        <input id="ll-host" type="text" placeholder="lavalink.example.com">
                    </div>
                    <div class="form-group">
                        <label>Port</label>
                        <input id="ll-port" type="number" placeholder="2333">
                    </div>
                    <div class="form-group" style="grid-column: 1 / -1;">
                        <label>Password (API Key)</label>
                        <input id="ll-password" type="password" placeholder="password">
                    </div>
                    <div class="form-group">
                        <label>Secure (SSL)</label>
                        <select id="ll-secure">
                            <option value="true">true</option>
                            <option value="false">false</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Node Id</label>
                        <input id="ll-id" type="text" placeholder="default">
                    </div>
                </div>

                <div style="display:flex; gap:10px; margin-top: 14px;">
                    <button class="btn btn-primary" onclick="saveLavalink()">حفظ وتطبيق</button>
                    <button class="btn" onclick="testLavalink()">اختبار الاتصال</button>
                    <button class="btn" onclick="loadLavalink()">تحديث</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <script src="/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadUser();
            loadStats();
            loadGuilds();
            loadLavalink();
        });
    </script>
</body>

</html>
